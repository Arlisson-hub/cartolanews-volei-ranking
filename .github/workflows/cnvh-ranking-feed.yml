name: Atualizar rankings públicos de vôlei

on:
  workflow_dispatch:
  schedule:
    - cron: '17 8 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Gerar rankings de quadra e praia
        shell: bash
        run: |
          if [ -f "tools/update-public-rankings.py" ]; then
            SCRIPT="tools/update-public-rankings.py"
          elif [ -f "cartolanews-volei-hub/tools/update-public-rankings.py" ]; then
            SCRIPT="cartolanews-volei-hub/tools/update-public-rankings.py"
          else
            echo "::error::tools/update-public-rankings.py não encontrado."
            exit 1
          fi
          python "$SCRIPT"
      - name: Publicar JSONs
        shell: bash
        run: |
          git config user.name "cnvh-ranking-bot"
          git config user.email "actions@users.noreply.github.com"
          git add generated-rankings/*.json 2>/dev/null || true
          git add cartolanews-volei-hub/generated-rankings/*.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Atualiza rankings de vôlei"
          git push
