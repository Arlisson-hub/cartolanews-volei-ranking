name: Atualizar feeds autorizados de ranking

on:
  workflow_dispatch:
  schedule:
    - cron: '17 8 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Baixar e validar feeds licenciados
        env:
          CNVH_RANKING_MALE_URL: ${{ secrets.CNVH_RANKING_MALE_URL }}
          CNVH_RANKING_FEMALE_URL: ${{ secrets.CNVH_RANKING_FEMALE_URL }}
        run: php tools/github-authorized-ranking-feed.php
      - name: Publicar alterações
        run: |
          git config user.name "cnvh-ranking-bot"
          git config user.email "actions@users.noreply.github.com"
          git add generated-rankings/*.json
          git diff --cached --quiet || git commit -m "Atualiza rankings autorizados"
          git push

